services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongodata:/data/db

  backend:
    build: ./community-postings-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/appdb
    depends_on:
      - mongo

  frontend:
    build: ./applywise-web
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

  tunnel:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate --url http://frontend:80
    depends_on:
      - frontend

volumes:
  mongodata:
